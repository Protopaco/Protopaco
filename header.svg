<svg width="680" height="80" viewBox="0 0 680 80" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 22px; font-weight: 500; fill: #1a1a1a; }
    .sub  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 15px; fill: #666666; }
    @media (prefers-color-scheme: dark) {
      .name { fill: #e6edf3; }
      .sub  { fill: #8b949e; }
    }
  </style>
  <rect x="0" y="10" width="3" height="60" rx="1.5" fill="#378ADD"/>
  <text class="name" x="20" y="40">Paul Stevens</text>
  <text class="sub"  x="20" y="62">Engineering Manager &amp; Developer · Portland, OR</text>
</svg>
